name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: frontend/alzheimer-app
        run: npm install

      - name: Build Angular (production)
        working-directory: frontend/alzheimer-app
        run: npx ng build --configuration production --base-href /alzheimer-detection/

      - name: Copy index.html to 404.html (SPA routing fix)
        run: cp frontend/alzheimer-app/dist/alzheimer-app/browser/index.html frontend/alzheimer-app/dist/alzheimer-app/browser/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/alzheimer-app/dist/alzheimer-app/browser
          publish_branch: gh-pages
          force_orphan: true
